<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Kiosk-friendly viewport: no user zoom, fill the device screen. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#CB2C30" />
    <title>PNW Repair Uploader</title>
    <!-- Apply the saved/OS theme before first paint to avoid a flash. Mirrors
         the rules in src/lib/theme.ts — keep them in sync. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("pnw-uploader-theme");
          var dark =
            p === "dark" ||
            (p !== "light" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
